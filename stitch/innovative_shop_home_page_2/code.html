<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In - Innovative Shop</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .dark .glass {
            background: rgba(16, 22, 34, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .animated-gradient-bg {
            background: linear-gradient(-45deg, #f6f6f8, #eef2ff, #e0e7ff, #f6f6f8);
            background-size: 400% 400%;
        }
        .dark .animated-gradient-bg {
            background: linear-gradient(-45deg, #101622, #1e293b, #0f172a, #101622);
            background-size: 400% 400%;
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen animated-gradient-bg flex items-center justify-center p-4">
<div class="w-full max-w-md">
<div class="flex flex-col items-center mb-8">
<div class="size-12 bg-primary rounded-xl flex items-center justify-center text-white mb-4 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-3xl">bolt</span>
</div>
<h1 class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-white">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2">Sign in to your Innovative Shop account</p>
</div>
<div class="glass rounded-2xl p-8 shadow-2xl border border-white/50 dark:border-white/10">
<form class="space-y-6">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-white/50 dark:bg-slate-900/50 border-slate-200 dark:border-slate-700 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="phone">Phone Number</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">call</span>
<input class="w-full bg-white/50 dark:bg-slate-900/50 border-slate-200 dark:border-slate-700 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" id="phone" name="phone" placeholder="+1 (555) 000-0000" required="" type="tel"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/30 transition-all transform hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
                    Continue
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-slate-200 dark:border-slate-700/50 flex flex-col items-center gap-4">
<p class="text-xs text-slate-500 dark:text-slate-400 text-center px-4">
                    By continuing, you agree to our <a class="text-primary hover:underline font-medium" href="#">Terms of Service</a> and <a class="text-primary hover:underline font-medium" href="#">Privacy Policy</a>.
                </p>
</div>
</div>
<div class="mt-8 flex justify-center gap-6 text-sm text-slate-500 dark:text-slate-400">
<a class="hover:text-primary transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-sm">help</span>
                Need Help?
            </a>
<a class="hover:text-primary transition-colors" href="#">Create Account</a>
</div>
</div>

</body></html>
